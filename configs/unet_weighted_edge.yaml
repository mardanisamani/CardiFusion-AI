# Phase 3 — weighted-edge U-Net (Stage 1.2). Identical to baseline EXCEPT the
# weighted-edge loss. AI-assisted config.
# Sweep `lambda` over {2,4,6,8,10} (override on the CLI or duplicate this file)
# and keep the checkpoint with the best validation Dice.
name: unet_weighted_edge
seed: 1337
encoder: resnet34
encoder_weights: imagenet
img_size: 512
batch_size: 8
lr: 0.001
epochs: 120
patience: 20
num_workers: 4
weighted_edge: true
lambda: 6.0           # best-on-val from the {2,4,6,8,10} sweep; update after sweeping
edge_dilate_px: 2
train_dir: data/syntax/train
val_dir: data/syntax/val
weights_path: weights/unet_weighted_edge.pt
